<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        a {
            color: red;
        }
        a:visited {
            color: darkred;
        }
        a:hover {
            color: black;
            text-decoration: none;
        }
        a:active {
            color: blue;
        }
        .especial::after {
            content: ' ⇐';
        }
        .especial::before {
            content: '⇒ ';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="#">Repositório GitHub</a></li>
        <li><a href="#">Canal do Youtube</a></li>
        <li><a href="#" class="especial">Site do CursoemVideo</a></li>
    </ul>
    <form action="">
        <label for="nome">Nome: </label>
        <input type="text" name="" id="nome" required>
    </form>
    <table>
        <tr>
            <td>Nome</td>
            <td>Idade</td>
            <td>Peso</td>
        </tr>

    </table>    
</body>
</html>
