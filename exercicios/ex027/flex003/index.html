<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexBox</title>
    <style>
      body {
        background-color: lightblue;
        font-family: Arial, Helvetica, sans-serif;
      }

      div.container {
        background-color: beige;
        display: flex;  
        flex-flow: row wrap-reverse;
      }

      div.item {
        background-color: azure;
        border: 1px solid black;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Exemplo de conteúdo A</div>
      <div class="item">Exemplo de conteúdo B</div>
      <div class="item">Exemplo de conteúdo C</div>
      <div class="item">Exemplo de conteúdo D</div>
      <div class="item">Exemplo de conteúdo E</div>
      <div class="item">Exemplo de conteúdo F</div>
      <div class="item">Exemplo de conteúdo G</div>
    </div>
  </body>
</html>
