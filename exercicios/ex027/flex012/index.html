<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, Helvetica, sans-serif;
        }

        div.container {
            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            align-items: flex-end;
           
            height: 350px;
            background-color: blanchedalmond;
        }

        div.item {
            flex-basis: 100px;  

            background-color: azure;
            border: 1px solid black;
            text-align: center;
            margin: 0px 5px;
            padding: 8px;
        }

        div#cxA {
            flex-shrink: 0;   
            flex-grow: 1;   
            
            /* align-self: flex-end; */
        }

        div#cxB {
            flex-shrink: 1;
            flex-grow: 0;

            /* align-self: stretch; */
        }

        div#cxC {
            flex-shrink: 2;
            flex-grow: 0;
            
            /* align-self: center; */
        }

        div#cxD {
            flex-shrink: 2;
            flex-grow: 2;
            
            /* align-self: center; */
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
        <div class="item" id="cxD">D</div>
    </div>
</body>
</html>
