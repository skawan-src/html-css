<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        /* Para fazer degradê usar o seletor "*" */
        /* Pode ser feito gradient com o seletor: background-image: linear-gradient ou o radial-gradient */
        body {
            margin: 0;
            background-image: radial-gradient(circle, #F2AE30, #F2F2F2, #F2F2F2);
        }
    </style>
</head>
<body>
    <div>
        <h1>Testando o gradiente</h1>
    </div>
</body>
</html>
