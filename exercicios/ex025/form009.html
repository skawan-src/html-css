<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="" method="get" autocomplete="">
        <p>
            <label for="inum">Número:</label>
            <input type="range" name="numero" id="inum" min="0" max="10" oninput="ival.innerHTML = Number(inum.value)" value="0">
            <output id="ival"></output>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
