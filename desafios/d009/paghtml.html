<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus videos</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background-color: rgb(35, 35, 35);
            text-align: center;
        }
        h1 {
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }   
        .seta {
            margin-top: 20px;
        }
        .link {
            margin-top: 20px;
        }
        .link>a {
            text-decoration: none;
            color: white;
            font-size: 25px;
        }
    </style>
</head>
<body>
    <h1>Curso de HTML</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/CN9hVoi_CPQ?si=_XHr3c6sxbHmEoel" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <div class="link">
        <a href="index.html">Veja o curso completo</a>
    </div>
    <div class="seta">
        <a href="index.html"><img src="imagens/voltar.png" alt=""></a>
    </div>  
</body>
</html>
