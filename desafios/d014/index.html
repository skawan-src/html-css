<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif
        }
        table {
            border-collapse: collapse;
            width: 500px;
        }
        table th,td {
            border: 1px solid black;
            padding: 10px;
        }
        .fundo {
            background-color: gray;
            color: white;
        }
        .fundo-footer {
            background-color: gray;
            color: white;
            text-align: left;
        }
        .center {
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main>
        <table>
            <thead>
                <tr>
                    <th rowspan="2" class="fundo" scope="col">Área</th>
                    <th rowspan="2" class="fundo" scope="col">Disciplinas</th>
                    <th colspan="2" class="fundo" scope="colgroup">Notas</th>
                    <th rowspan="2" class="fundo" scope="col">Média</th>
                </tr>
                <tr>
                    <th class="fundo" scope="col">Nota 1</th>
                    <th class="fundo" scope="col">Nota 2</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th rowspan="4" scope="rowgroup">Exatas</th>
                    <td>Matemática</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                </tr>
                <tr>
                    <td>Química</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                </tr>
                <tr>
                    <th colspan="4" class="fundo-footer" scope="row">Média Exatas</th>
                    <td class="fundo center">0.0</td>
                </tr>
                <tr>
                    <th rowspan="2" scope="rowgroup">Humanas</th>
                    <td>História</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                    <td class="center">0.0</td>
                </tr>
                <tr>
                    <th colspan="4" class="fundo-footer" scope="row">Média de Humanas</th>
                    <td class="fundo center">0.0</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
